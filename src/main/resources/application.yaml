server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        # 1. Rota para o serviço de Autenticação (Login e Cadastro)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**, /login/**

        # 2. Rota para o serviço de Clientes
        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/clientes/**

        # 3. Rota para o serviço de Produtos
        - id: produto-service
          uri: http://localhost:8083
          predicates:
            - Path=/produtos/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG