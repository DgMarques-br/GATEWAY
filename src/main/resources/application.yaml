server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        -
        # 1. Rota para o serviço de Autenticação (Login e Cadastro)
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**, /login/**

        # 2. Rota para o serviço de Clientes
        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/clientes/**
          filters:
            - TokenRelay=

        # 3. Rota para o serviço de Produtos (e Compras)
        - id: produto-service
          uri: http://localhost:8083
          predicates:
            - Path=/produtos/**, /compras/**
          filters:
            - TokenRelay=

logging:
  level:
    org.springframework.cloud.gateway: DEBUG